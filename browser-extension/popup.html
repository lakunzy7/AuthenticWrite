<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuthentiWrite AI Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { padding: 16px; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo { width: 32px; height: 32px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; }
    h1 { font-size: 16px; color: #1f2937; }
    .section { margin-bottom: 16px; }
    .btn { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .result { padding: 12px; border-radius: 8px; text-align: center; margin-top: 12px; }
    .result.ai { background: #fee2e2; border: 1px solid #fecaca; }
    .result.human { background: #dcfce7; border: 1px solid #bbf7d0; }
    .result-score { font-size: 28px; font-weight: bold; }
    .result-label { font-size: 14px; margin-top: 4px; }
    .loader { display: none; text-align: center; padding: 20px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text-select { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">AW</div>
      <h1>AuthentiWrite</h1>
    </div>
    
    <div class="section">
      <p class="text-select">Select text on any page and click Analyze to check for AI content.</p>
      <button id="analyzeBtn" class="btn">Analyze Selected Text</button>
    </div>
    
    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p style="color: #6b7280; font-size: 12px;">Analyzing...</p>
    </div>
    
    <div id="result" style="display: none;"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
