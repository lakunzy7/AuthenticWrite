name: Build, Scan & Push Images

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-push-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_LOWER: ghcr.io/${{ github.repository_owner }}/authenticwrite

jobs:
  metadata:
    name: Generate image metadata
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}
      image_tag: ${{ steps.images.outputs.image_tag }}
    steps:
      - name: Generate image tag
        id: images
        run: |
          TAG="${{ github.sha }}"
          SHORT_SHA="${TAG:0:8}"
          backend_image="${{ env.IMAGE_NAME_LOWER }}/backend:${SHORT_SHA}"
          frontend_image="${{ env.IMAGE_NAME_LOWER }}/frontend:${SHORT_SHA}"
          echo "backend_image=${backend_image}" >> $GITHUB_OUTPUT
          echo "frontend_image=${frontend_image}" >> $GITHUB_OUTPUT
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ needs.metadata.outputs.backend_image }}
            ${{ env.IMAGE_NAME_LOWER }}/backend:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME_LOWER }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME_LOWER }}/backend:buildcache,mode=max

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/authenticwrite
          file: ./frontend/authenticwrite/Dockerfile
          push: true
          tags: |
            ${{ needs.metadata.outputs.frontend_image }}
            ${{ env.IMAGE_NAME_LOWER }}/frontend:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME_LOWER }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME_LOWER }}/frontend:buildcache,mode=max

  scan-backend:
    name: Scan backend image
    runs-on: ubuntu-latest
    needs: [metadata, build-backend]
    steps:
      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.TRIVY_TOKEN }}
        with:
          image-ref: ${{ needs.metadata.outputs.backend_image }}
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy results for backend
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

  scan-frontend:
    name: Scan frontend image
    runs-on: ubuntu-latest
    needs: [metadata, build-frontend]
    steps:
      - name: Run Trivy scan on frontend image
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.TRIVY_TOKEN }}
        with:
          image-ref: ${{ needs.metadata.outputs.frontend_image }}
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy results for frontend
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  notify-deployment-repo:
    name: Trigger deployment repo webhook
    runs-on: ubuntu-latest
    needs: [metadata, scan-backend, scan-frontend]
    if: success()
    steps:
      - name: Trigger multi-cluster-deployment repo workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITOPS_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/lakunzy7/multi-cluster-deployment/dispatches" \
            -d '{
              "event_type": "images-built",
              "client_payload": {
                "backend_image": "${{ needs.metadata.outputs.backend_image }}",
                "frontend_image": "${{ needs.metadata.outputs.frontend_image }}",
                "sha": "${{ github.sha }}"
              }
            }'

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [metadata, build-backend, build-frontend, scan-backend, scan-frontend, notify-deployment-repo]
    if: always()
    steps:
      - name: Print image details
        run: |
          echo "=== Build Summary ==="
          echo "Backend:  ${{ needs.metadata.outputs.backend_image }}"
          echo "Frontend: ${{ needs.metadata.outputs.frontend_image }}"
          echo "Tag:      ${{ needs.metadata.outputs.image_tag }}"
          echo ""
          echo "Images available at:"
          echo "  https://github.com/${{ github.repository_owner }}/packages"
