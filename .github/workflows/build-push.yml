name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-push.yml'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # For Trivy scan upload

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/authenticwrite
          file: ./frontend/authenticwrite/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan backend image with Trivy
      - name: Run Trivy vulnerability scan on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend.sarif'

      # Scan frontend image with Trivy
      - name: Run Trivy vulnerability scan on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend.sarif'

      # Upload scan results to GitHub Security tab
      - name: Upload Trivy backend scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-backend.sarif'

      - name: Upload Trivy frontend scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-frontend.sarif'

      # Update deployment repo with new image tags
      - name: Update deployment repo kustomize overlays
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}"

          # Clone multi-cluster-deployment repo
          git clone https://x-access-token:${{ secrets.GITOPS_REPO_TOKEN }}@github.com/lakunzy7/multi-cluster-deployment.git deployment-repo
          cd deployment-repo

          # Update dev overlay
          cd kubernetes/overlays/dev
          kustomize edit set image \
            ghcr.io/lakunzy7/authenticwrite/backend=${BACKEND_IMAGE} \
            ghcr.io/lakunzy7/authenticwrite/frontend=${FRONTEND_IMAGE}
          cd ../../..

          # Update staging overlay
          cd kubernetes/overlays/staging
          kustomize edit set image \
            ghcr.io/lakunzy7/authenticwrite/backend=${BACKEND_IMAGE} \
            ghcr.io/lakunzy7/authenticwrite/frontend=${FRONTEND_IMAGE}
          cd ../../..

          # Update prod overlay (Kargo controls promotion from staging)
          cd kubernetes/overlays/prod
          kustomize edit set image \
            ghcr.io/lakunzy7/authenticwrite/backend=${BACKEND_IMAGE} \
            ghcr.io/lakunzy7/authenticwrite/frontend=${FRONTEND_IMAGE}
          cd ../../..

          # Stage and push changes
          git add kubernetes/overlays/*/kustomization.yaml

          git commit -m "chore: update AuthenticWrite images to ${{ github.sha }}" || true
          git push origin main
