name: Build and Push Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/build-push.yml'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push frontend image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/authenticwrite
          file: ./frontend/authenticwrite/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update deployment repo with new image tags
      - name: Update deployment repo
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}"

          git clone https://x-access-token:${{ secrets.GITOPS_REPO_TOKEN }}@github.com/lakunzy7/multi-cluster-deployment.git deployment-repo
          cd deployment-repo

          # Update dev overlay
          kustomize edit set image \
            backend=${BACKEND_IMAGE} \
            frontend=${FRONTEND_IMAGE} \
            -k eshop-config/overlays/dev

          # Update staging overlay
          kustomize edit set image \
            backend=${BACKEND_IMAGE} \
            frontend=${FRONTEND_IMAGE} \
            -k eshop-config/overlays/staging

          # Update prod overlay (pins same image, Kargo controls promotion)
          kustomize edit set image \
            backend=${BACKEND_IMAGE} \
            frontend=${FRONTEND_IMAGE} \
            -k eshop-config/overlays/prod

          git add eshop-config/overlays/dev/kustomization.yaml
          git add eshop-config/overlays/staging/kustomization.yaml
          git add eshop-config/overlays/prod/kustomization.yaml

          git commit -m "chore: update AuthenticWrite images to ${{ github.sha }}" || true
          git push origin main
